<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Вставьте это внутри <head> -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230f172a%22 rx=%2220%22/><path d=%22M30 30 L70 30 L50 50 L70 70 L30 70 L50 50 Z%22 fill=%22none%22 stroke=%22%2300F5D4%22 stroke-width=%228%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ПЕРЕМЕННЫЕ ТЕМ ===== */
        :root {
            /* Дефолтная тема (Neon Purple) */
            --primary: #6C63FF;
            --accent: #00F5D4;
            --danger: #FF4B6E;
            --warning: #FEBD69;
            --success: #00F5D4;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        /* Тема Cyberpunk */
        [data-theme="cyber"] {
            --primary: #fcee0a;
            --accent: #00f0ff;
            --danger: #ff003c;
            --warning: #ffae00;
            --success: #00f0ff;
            --bg-dark: #050505;
        }

        /* Тема Ocean */
        [data-theme="ocean"] {
            --primary: #4facfe;
            --accent: #00f2fe;
            --danger: #ff5858;
            --warning: #fccb90;
            --success: #43e97b;
            --bg-dark: #001f3f;
        }

        /* Тема Sunset */
        [data-theme="sunset"] {
            --primary: #fa709a;
            --accent: #fee140;
            --danger: #ff0844;
            --warning: #ffb199;
            --success: #43e97b;
            --bg-dark: #2d1b4e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: var(--text-main);
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 { top: 10%; left: 10%; width: 300px; height: 300px; background: var(--primary); border-radius: 40% 60% 70% 30%; }
        .blob-2 { bottom: 10%; right: 10%; width: 350px; height: 350px; background: var(--danger); border-radius: 60% 40% 30% 70%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, 50px) rotate(10deg); }
        }

        .container {
            width: 500px;
            max-width: 95vw;
            perspective: 1000px;
        }

        .screen {
            display: none;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .screen.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* ===== НАСТРОЙКИ (Settings Bar) ===== */
        .settings-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .setting-group {
            display: flex;
            gap: 5px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .icon-btn.active { background: var(--primary); color: white; box-shadow: 0 0 10px var(--primary); }

        /* ===== СЛОЖНОСТЬ ===== */
        .difficulty-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .diff-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .diff-card:hover { background: rgba(255, 255, 255, 0.08); }
        
        .diff-card.selected {
            background: rgba(108, 99, 255, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.2);
            transform: translateY(-2px);
        }

        .diff-icon { font-size: 1.8rem; margin-bottom: 5px; display: block; }
        .diff-name { font-weight: 700; font-size: 0.9rem; }

        input[type="text"], input[type="number"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(108, 99, 255, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgba(108, 99, 255, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            margin-top: 12px;
        }
        .btn-secondary:hover { color: white; background: rgba(255,255,255,0.05); }

        /* ===== ИГРА ===== */
        .hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .hud-item {
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 12px;
            min-width: 80px;
        }

        .hud-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .hud-value { font-size: 1.4rem; font-weight: 700; }
        .val-score { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .val-time { color: var(--warning); }
        .val-q { color: var(--primary); }

        .time-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        .time-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            width: 100%;
            transition: width 1s linear;
            box-shadow: 0 0 10px var(--accent);
        }

        .math-problem {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .operator { color: var(--accent); }

        .feedback-msg {
            height: 24px;
            text-align: center;
            font-weight: 600;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: var(--danger) !important; color: var(--danger); }
        .pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-color: var(--success) !important; color: var(--success); }

        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        @keyframes pop { 50% { transform: scale(1.1); } }

        /* ===== РЕЗУЛЬТАТЫ И ТАБЛИЦА ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-val { font-size: 1.8rem; font-weight: 800; }
        .c-green { color: var(--success); }
        .c-red { color: var(--danger); }
        .c-blue { color: var(--primary); }

        .wrong-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }
        .wrong-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 75, 110, 0.1);
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border-left: 3px solid var(--danger);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .leaderboard-table th { text-align: left; color: var(--text-muted); font-size: 0.8rem; padding: 0 10px 10px; }
        .leaderboard-table td { background: rgba(255,255,255,0.03); padding: 12px; font-weight: 600; }
        .leaderboard-table tr td:first-child { border-radius: 10px 0 0 10px; color: var(--text-muted); }
        .leaderboard-table tr td:last-child { border-radius: 0 10px 10px 0; text-align: right; color: var(--accent); }
        
        .rank-1 td { background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent); color: #ffd700; }
        .rank-2 td { background: linear-gradient(90deg, rgba(192,192,192,0.1), transparent); color: #c0c0c0; }
        .rank-3 td { background: linear-gradient(90deg, rgba(205,127,50,0.1), transparent); color: #cd7f32; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="container">

    <!-- СТАРТ -->
    <div id="startScreen" class="screen active">
        
        <!-- Панель настроек -->
        <div class="settings-bar">
            <div class="setting-group">
                <button class="icon-btn active" onclick="setLang('ru')" id="btnRu">RU</button>
                <button class="icon-btn" onclick="setLang('en')" id="btnEn">EN</button>
            </div>
            <div class="setting-group">
                <button class="icon-btn active" onclick="setTheme('default')" style="background:var(--primary)"></button>
                <button class="icon-btn" onclick="setTheme('cyber')" style="background:#fcee0a"></button>
                <button class="icon-btn" onclick="setTheme('ocean')" style="background:#4facfe"></button>
                <button class="icon-btn" onclick="setTheme('sunset')" style="background:#fa709a"></button>
            </div>
        </div>

        <h1 data-i18n="title">Math Master</h1>
        <p class="subtitle" data-i18n="subtitle">Проверь свой интеллект</p>

        <div class="difficulty-selector">
            <div class="diff-card selected" onclick="setDiff('easy', this)">
                <span class="diff-icon">🌱</span>
                <div class="diff-name" data-i18n="easy">Лёгкий</div>
            </div>
            <div class="diff-card" onclick="setDiff('medium', this)">
                <span class="diff-icon">🔥</span>
                <div class="diff-name" data-i18n="medium">Средний</div>
            </div>
            <div class="diff-card" onclick="setDiff('hard', this)">
                <span class="diff-icon">💀</span>
                <div class="diff-name" data-i18n="hard">Хардкор</div>
            </div>
        </div>

        <input type="text" id="playerName" placeholder="Твоё имя..." maxlength="12" autocomplete="off">
        <button class="btn btn-primary" onclick="startGame()" data-i18n="start">ПОЕХАЛИ 🚀</button>
        <button class="btn btn-secondary" onclick="showLeaderboard()" data-i18n="leaders">🏆 Лучшие игроки</button>
    </div>

    <!-- ИГРА -->
    <div id="gameScreen" class="screen">
        <div class="hud">
            <div class="hud-item">
                <div class="hud-label" data-i18n="score">Очки</div>
                <div class="hud-value val-score" id="scoreVal">0</div>
            </div>
            <div class="hud-item">
                <div class="hud-label" data-i18n="time">Время</div>
                <div class="hud-value val-time" id="timeVal">60</div>
            </div>
            <div class="hud-item">
                <div class="hud-label" data-i18n="question">Вопрос</div>
                <div class="hud-value val-q" id="qVal">1/15</div>
            </div>
        </div>

        <div class="time-track">
            <div class="time-fill" id="timeBar"></div>
        </div>

        <div class="math-problem" id="problemDisplay"></div>

        <div class="input-wrapper">
            <input type="number" id="answerInput" placeholder="?" pattern="\d*">
        </div>
        
        <div class="feedback-msg" id="feedback"></div>
    </div>

    <!-- РЕЗУЛЬТАТЫ -->
    <div id="resultScreen" class="screen">
        <h1 data-i18n="finish">Финиш! 🏁</h1>
        <p class="subtitle" id="resultMessage"></p>

        <div class="stats-grid">
            <div class="stat-box">
                <div style="font-size:0.8rem; color:var(--text-muted)" data-i18n="score">Счёт</div>
                <div class="stat-val c-blue" id="endScore">0</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8rem; color:var(--text-muted)" data-i18n="accuracy">Точность</div>
                <div class="stat-val c-green" id="endAcc">0%</div>
            </div>
        </div>

        <div id="wrongAnswersBlock">
            <div style="margin-bottom:10px; font-weight:600; color:var(--danger)" data-i18n="mistakes">Ошибки:</div>
            <div class="wrong-list" id="wrongList"></div>
        </div>

        <div style="margin-top: 20px;">
            <div style="font-size: 0.9rem; margin-bottom: 10px; color: var(--text-muted)" data-i18n="topLocal">Локальный топ:</div>
            <div id="miniLeaderboard"></div>
        </div>

        <button class="btn btn-primary" onclick="restart()" style="margin-top: 20px" data-i18n="again">ЕЩЁ РАЗ 🔄</button>
        <button class="btn btn-secondary" onclick="goHome()" data-i18n="menu">В меню</button>
    </div>

    <!-- ТАБЛИЦА ЛИДЕРОВ -->
    <div id="leaderboardScreen" class="screen">
        <h1 data-i18n="topPlayers">Топ игроков 👑</h1>
        <div id="fullLeaderboard" style="margin: 20px 0;"></div>
        <button class="btn btn-primary" onclick="goHome()" data-i18n="back">НАЗАД</button>
    </div>

</div>

<script>
    // --- ЛОКАЛИЗАЦИЯ ---
    const LANG = {
        ru: {
            title: "Математический мастер",
            subtitle: "Проверь свой интеллект",
            easy: "Лёгкий",
            medium: "Средний",
            hard: "Хардкор",
            start: "ПОЕХАЛИ 🚀",
            leaders: "🏆 Лучшие игроки",
            score: "Очки",
            time: "Время",
            question: "Вопрос",
            finish: "Финиш! 🏁",
            accuracy: "Точность",
            mistakes: "Ошибки:",
            topLocal: "Локальный топ:",
            again: "ЕЩЁ РАЗ 🔄",
            menu: "В меню",
            topPlayers: "Топ игроков 👑",
            back: "НАЗАД",
            msgBad: "Попробуй еще раз",
            msgGood: "Хороший результат!",
            msgGreat: "Ты настоящий математик!",
            msgPerfect: "ИДЕАЛЬНО! 🏆",
            phName: "Твоё имя...",
            emptyLB: "Пока пусто"
        },
        en: {
            title: "Math Master",
            subtitle: "Test your intelligence",
            easy: "Easy",
            medium: "Medium",
            hard: "Hardcore",
            start: "LET'S GO 🚀",
            leaders: "🏆 Leaderboard",
            score: "Score",
            time: "Time",
            question: "Question",
            finish: "Finished! 🏁",
            accuracy: "Accuracy",
            mistakes: "Mistakes:",
            topLocal: "Local Top:",
            again: "PLAY AGAIN 🔄",
            menu: "Main Menu",
            topPlayers: "Top Players 👑",
            back: "BACK",
            msgBad: "Try again",
            msgGood: "Good job!",
            msgGreat: "You are a mathematician!",
            msgPerfect: "PERFECT! 🏆",
            phName: "Your name...",
            emptyLB: "Empty yet"
        }
    };

    let currentLang = 'ru';

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btnRu').classList.toggle('active', lang === 'ru');
        document.getElementById('btnEn').classList.toggle('active', lang === 'en');
        
        // Обновляем все тексты
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(LANG[lang][key]) el.textContent = LANG[lang][key];
        });

        $('playerName').placeholder = LANG[lang].phName;
    }

    // --- ТЕМЫ ---
    function setTheme(themeName) {
        document.documentElement.setAttribute('data-theme', themeName);
        // Обновляем активную кнопку темы (визуально)
        const buttons = document.querySelectorAll('.settings-bar .icon-btn');
        // Кнопки тем идут с 3-й позиции (индекс 2)
        // Простая логика подсветки: убираем у всех, добавляем нажатой
        buttons.forEach(b => {
            if(b.style.background) b.classList.remove('active'); // сброс для цветных
            else b.classList.remove('active'); // сброс для RU/EN
        });
        event.target.classList.add('active');
    }

    // --- УТИЛИТЫ ---
    function $(id) { return document.getElementById(id); }
    
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        $(id).classList.add('active');
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // --- ИГРОВАЯ ЛОГИКА ---
    const CONFIG = {
        easy:   { time: 60, q: 15, max: 20, ops: ['+','-'], score: 10 },
        medium: { time: 45, q: 20, max: 50, ops: ['+','-','×'], score: 20 },
        hard:   { time: 30, q: 25, max: 99, ops: ['+','-','×','÷'], score: 30 }
    };

    let game = {
        diff: 'easy',
        name: '',
        score: 0,
        currentQ: 0,
        totalQ: 0,
        timeLeft: 0,
        timerId: null,
        correctAnswer: 0,
        mistakes: [],
        isActive: false
    };

    function setDiff(level, el) {
        game.diff = level;
        document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function startGame() {
        const nameInput = $('playerName');
        if (!nameInput.value.trim()) {
            nameInput.style.borderColor = 'var(--danger)';
            nameInput.focus();
            setTimeout(() => nameInput.style.borderColor = '', 1000);
            return;
        }

        const settings = CONFIG[game.diff];
        game.name = nameInput.value.trim();
        game.score = 0;
        game.currentQ = 0;
        game.totalQ = settings.q;
        game.timeLeft = settings.time;
        game.mistakes = [];
        game.isActive = true;

        updateHUD();
        showScreen('gameScreen');
        nextQuestion();
        
        clearInterval(game.timerId);
        game.timerId = setInterval(tick, 1000);
        
        setTimeout(() => $('answerInput').focus(), 100);
    }

    function tick() {
        game.timeLeft--;
        const pct = (game.timeLeft / CONFIG[game.diff].time) * 100;
        $('timeBar').style.width = pct + '%';
        $('timeVal').textContent = game.timeLeft;

        if (pct < 20) $('timeBar').style.background = 'var(--danger)';
        else $('timeBar').style.background = 'linear-gradient(90deg, var(--accent), var(--primary))';

        if (game.timeLeft <= 0) endGame();
    }

    function nextQuestion() {
        if (game.currentQ >= game.totalQ) { endGame(); return; }
        
        game.currentQ++;
        updateHUD();

        const conf = CONFIG[game.diff];
        const op = conf.ops[rand(0, conf.ops.length - 1)];
        let a, b, ans;

        if (op === '+') { a = rand(1, conf.max); b = rand(1, conf.max); ans = a + b; }
        else if (op === '-') { a = rand(1, conf.max); b = rand(1, a); ans = a - b; }
        else if (op === '×') { a = rand(2, 12); b = rand(2, 12); ans = a * b; }
        else if (op === '÷') { b = rand(2, 10); ans = rand(2, 10); a = b * ans; }

        game.correctAnswer = ans;
        $('problemDisplay').innerHTML = `${a} <span class="operator">${op}</span> ${b}`;
        $('answerInput').value = '';
        $('answerInput').className = '';
        $('feedback').style.opacity = '0';
    }

    function checkAnswer() {
        if (!game.isActive) return;
        
        const input = $('answerInput');
        const val = parseInt(input.value);
        
        if (isNaN(val)) return;

        if (val === game.correctAnswer) {
            game.score += CONFIG[game.diff].score;
            input.classList.add('pop');
            showFeedback(currentLang === 'ru' ? 'Верно! 🔥' : 'Correct! 🔥', 'var(--success)');
            setTimeout(nextQuestion, 400);
        } else {
            game.mistakes.push({ q: $('problemDisplay').innerText, a: val, c: game.correctAnswer });
            input.classList.add('shake');
            showFeedback(`${currentLang === 'ru' ? 'Ошибка!' : 'Wrong!'} ${game.correctAnswer}`, 'var(--danger)');
            setTimeout(nextQuestion, 1000);
        }
        updateHUD();
    }

    function showFeedback(text, color) {
        const fb = $('feedback');
        fb.textContent = text;
        fb.style.color = color;
        fb.style.opacity = '1';
    }

    function updateHUD() {
        $('scoreVal').textContent = game.score;
        $('qVal').textContent = `${game.currentQ}/${game.totalQ}`;
    }

    function endGame() {
        game.isActive = false;
        clearInterval(game.timerId);
        
        const total = game.currentQ; 
        const correct = total - game.mistakes.length;
        const acc = total > 0 ? Math.round((correct / total) * 100) : 0;

        $('endScore').textContent = game.score;
        $('endAcc').textContent = acc + '%';
        
        let msgKey = "msgBad";
        if (acc > 50) msgKey = "msgGood";
        if (acc > 80) msgKey = "msgGreat";
        if (acc === 100 && total > 5) msgKey = "msgPerfect";
        $('resultMessage').textContent = LANG[currentLang][msgKey];

        const wList = $('wrongList');
        if (game.mistakes.length === 0) {
            $('wrongAnswersBlock').style.display = 'none';
        } else {
            $('wrongAnswersBlock').style.display = 'block';
            wList.innerHTML = game.mistakes.map(m => `
                <div class="wrong-item">
                    <span>${m.q.replace('=', '')}</span>
                    <span>${currentLang==='ru'?'Твой':'You'}: <b>${m.a}</b> • OK: <b style="color:var(--success)">${m.c}</b></span>
                </div>
            `).join('');
        }

        saveResult(acc);
        renderMiniLB();
        showScreen('resultScreen');
    }

    // --- ЛИДЕРБОРД ---
    function saveResult(acc) {
        let lb = JSON.parse(localStorage.getItem('mathLB')) || [];
        lb.push({
            name: game.name,
            score: game.score,
            diff: game.diff.toUpperCase(),
            date: new Date().toLocaleDateString()
        });
        lb.sort((a,b) => b.score - a.score);
        lb = lb.slice(0, 10);
        localStorage.setItem('mathLB', JSON.stringify(lb));
    }

    function getLBHTML(limit = 10) {
        let lb = JSON.parse(localStorage.getItem('mathLB')) || [];
        if (lb.length === 0) return `<div style="text-align:center;color:var(--text-muted)">${LANG[currentLang].emptyLB}</div>`;
        
        return `<table class="leaderboard-table">
            <thead><tr><th>#</th><th>Name</th><th>Lvl</th><th>Score</th></tr></thead>
            <tbody>
                ${lb.slice(0, limit).map((p, i) => `
                    <tr class="rank-${i+1}">
                        <td>${i+1}</td>
                        <td>${p.name}</td>
                        <td style="font-size:0.8em; opacity:0.7">${p.diff}</td>
                        <td>${p.score}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>`;
    }

    function renderMiniLB() { $('miniLeaderboard').innerHTML = getLBHTML(3); }
    function showLeaderboard() { $('fullLeaderboard').innerHTML = getLBHTML(10); showScreen('leaderboardScreen'); }

    function restart() { startGame(); }
    function goHome() { showScreen('startScreen'); }

    $('answerInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkAnswer(); });
    $('playerName').addEventListener('keypress', e => { if (e.key === 'Enter') startGame(); });

    // Init Lang
    setLang('ru');
</script>
</body>
</html>
